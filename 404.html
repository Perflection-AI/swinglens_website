    <style>
      body {
        font-family: 'Space Grotesk', sans-serif;
        background-color: #F6FAF5;
        color: #2c2c2c;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      
      /* 1. Grain Texture Overlay */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* 2. Graph Paper Pattern for Hero */
      .bg-grid-paper {
        background-size: 40px 40px;
        background-image: linear-gradient(to right, rgba(117, 216, 186, 0.15) 1px, transparent 1px),
                          linear-gradient(to bottom, rgba(117, 216, 186, 0.15) 1px, transparent 1px);
      }

      /* 3. Ruled Paper Pattern for Chat */
      .bg-ruled-paper {
        background-color: #F6FAF5;
        background-image: linear-gradient(rgba(117, 216, 186, 0.3) 1px, transparent 1px);
        background-size: 100% 2rem; /* Line height spacing */
      }

      /* Updated to be fresher: Golf 500 -> Golf 300 (Lime) */
      .text-gradient {
        background: linear-gradient(135deg, #4A9B7F 0%, #75D8BA 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      /* Fade Slide Up Animation */
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(16px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-slide-up {
        animation: fadeSlideUp 0.5s ease-out forwards;
      }

      /* GolfTI Waterfall Background */
      @keyframes waterfall-down {
        0% { transform: translateY(-120%) scale(var(--s, 1)); }
        100% { transform: translateY(120vh) scale(var(--s, 1)); }
      }
      .golfti-bg-item {
        position: absolute;
        animation: waterfall-down var(--dur, 20s) var(--delay, 0s) linear infinite;
        will-change: transform;
      }

      /* Auto Scroll Strip */
      @keyframes scroll-left {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); }
      }
      .scroll-strip {
        animation: scroll-left 30s linear infinite;
      }
      .scroll-strip:hover {
        animation-play-state: paused;
      }

      /* Custom Scrollbar */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background-color: #75D8BA; /* Teal Green thumb */
        border-radius: 20px;
        border: 1px solid #FBF8EE;
      }

      /* GolfTI Card Reveal Animations */
      @keyframes radarCardGlow {
        0% { opacity: 0; transform: scale(0.85); filter: blur(4px); }
        60% { opacity: 1; transform: scale(1.02); filter: blur(0px); }
        100% { opacity: 1; transform: scale(1); filter: blur(0px); }
      }
      .animate-radar-card-glow {
        animation: radarCardGlow 0.7s ease-out forwards;
      }

      @keyframes promptPulse {
        0%, 100% { opacity: 0.5; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-2px); }
      }
      .animate-prompt-pulse {
        animation: promptPulse 2s ease-in-out infinite;
      }

      @keyframes cardStackReveal {
        0% { opacity: 0; transform: scale(0.7) rotateY(15deg); }
        50% { opacity: 1; transform: scale(1.05) rotateY(-3deg); }
        100% { opacity: 1; transform: scale(1) rotateY(0deg); }
      }
      .animate-card-stack-reveal {
        animation: cardStackReveal 0.6s ease-out forwards;
      }

      @keyframes flashGlow {
        0% { box-shadow: 0 0 0 0 rgba(117, 216, 186, 0); }
        30% { box-shadow: 0 0 40px 12px rgba(117, 216, 186, 0.5); }
        100% { box-shadow: 0 0 0 0 rgba(117, 216, 186, 0); }
      }
      .animate-flash-glow {
        animation: flashGlow 0.8s ease-out forwards;
      }

      @keyframes swipeHint {
        0%, 100% { transform: translateX(0); }
        50% { transform: translateX(-6px); }
      }
      .animate-swipe-hint {
        animation: swipeHint 1.5s ease-in-out 2;
      }

      /* Nudge-left hint animation for first card */
      @keyframes nudgeLeft {
        0%, 100% { transform: translateX(0); }
        15% { transform: translateX(-8px) rotate(-1.5deg); }
        30% { transform: translateX(0); }
        45% { transform: translateX(-5px) rotate(-0.8deg); }
        60% { transform: translateX(0); }
        75% { transform: translateX(-3px) rotate(-0.4deg); }
      }
      .animate-nudge-left {
        animation: nudgeLeft 1.2s ease-in-out 2;
      }

      /* Card stack transition for swiping */
      .card-stack-item {
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                    box-shadow 0.35s ease;
      }

      /* Background scroll reveal */
      .bg-scroll-reveal {
        transition: opacity 0.7s ease-in-out;
      }

      /* Radar point transition */
      .radar-data-point {
        transition: cx 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    cy 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .radar-data-polygon {
        transition: d 0.8s cubic-bezier(0.4, 0, 0.2, 1),
                    opacity 0.8s ease-out;
      }
